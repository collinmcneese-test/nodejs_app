name: CI

on:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        version: [22, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.version }}
      - run: npm install
      - run: npm test
  deploy-staging:
    if: github.ref_name == 'main'
    needs:
      - test
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: staging deploy
        run: |
          echo "deployment steps will run here"
          exit 0
  deploy-prod:
    if: github.ref_name == 'main'
    needs:
      - test
      - deploy-staging
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: staging deploy
        run: |
          echo "deployment steps will run here"
          exit 0
